apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 28.13.0
      helm:
        releaseName: prometheus
        valueFiles:
          - $values/apps/infra/prometheus/values.yaml
    - repoURL: https://github.com/rbomfimpro/gitops-owl.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: o11y
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: "apps"
      kind: StatefulSet
      name: prometheus-alertmanager
      jsonPointers:
        - /spec/volumeClaimTemplates