apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo
  namespace: workloads
  labels:
    app.kubernetes.io/name: podinfo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: podinfo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: podinfo
    spec:
      containers:
      - name: podinfo
        image: ghcr.io/stefanprodan/podinfo:6.10.2
        ports:
        - containerPort: 9898
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo
  namespace: workloads
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: podinfo
  ports:
  - port: 80
    targetPort: 9898
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: podinfo
  namespace: workloads
spec:
  ingressClassName: traefik
  rules:
    - host: prometheus.owl.localhost
      http:
        paths:
          - backend:
              service:
                name: prometheus-server
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - prometheus.owl.localhost
      secretName: owl-tls